name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            output: prospec-linux-x64
            archive: prospec-linux-x64.tar.gz
          - os: macos-latest
            target: bun-darwin-arm64
            output: prospec-macos-arm64
            sign: true
            archive: prospec-macos-arm64.tar.gz
          - os: macos-latest
            target: bun-darwin-x64
            output: prospec-macos-x64
            sign: true
            archive: prospec-macos-x64.tar.gz
          - os: windows-latest
            target: bun-windows-x64
            output: prospec-windows-x64.exe
            archive: prospec-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: oven-sh/setup-bun@v2

      - name: Build bundle
        run: pnpm run bundle

      - name: Compile Standalone Binary
        run: bun build ./dist/cli-bundle.js --compile --minify --target=${{ matrix.target }} --outfile=dist/${{ matrix.output }}

      - name: Code Sign (macOS only)
        if: ${{ matrix.sign }}
        run: |
          codesign --remove-signature dist/${{ matrix.output }} || true
          codesign --force --sign - dist/${{ matrix.output }}


      - name: Smoke Test (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: ./dist/${{ matrix.output }} --version

      - name: Smoke Test (Windows)
        if: matrix.os == 'windows-latest'
        run: .\dist\${{ matrix.output }} --version

      - name: Package Binary (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: |
          cp dist/${{ matrix.output }} dist/prospec
          tar -czf dist/${{ matrix.archive }} -C dist prospec
          rm dist/prospec

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item dist\${{ matrix.output }} dist\prospec.exe
          Compress-Archive -Path dist\prospec.exe -DestinationPath dist\${{ matrix.archive }}
          Remove-Item dist\prospec.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          path: binaries
          merge-multiple: true

      - name: Display binaries
        run: ls -la binaries

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: binaries/*
