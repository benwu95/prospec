# Module dependency map — source of truth for module boundaries + dependency direction.
# Authored to match prospec/index.md (curated 6-module structure).
# Dependency direction (Constitution): cli → services → lib → types (no upward imports).
modules:
  - name: types
    description: Zod schemas, error hierarchy, skill definitions, Constitution rule
      types, and the canonical index-table column + knowledge-token-budget
      contracts. Leaf module — every other module imports its types.
    paths:
      - src/types
    keywords:
      - config
      - schema
      - errors
      - skill
      - change
      - zod
      - language
      - triggers
      - token-budget
      - measurement
      - scale
      - drift-report
      - feature-map
      - mcp
      - category
      - conventions
    relationships:
      depends_on: []
      used_by:
        - lib
        - services
        - cli
        - tests
    aliases:
      - 型別
      - 結構描述
      - type definitions
      - 錯誤類別
      - validation
      - 量測
      - 複雜度
      - 漂移報告
      - MCP 契約
      - 模組分類
    rationale: Leaf module with zero internal deps — all others import from here

  - name: lib
    description: Shared stateless utilities — config, file I/O, Handlebars
      rendering, scanning, deterministic token accounting, the zero-LLM drift
      engine (collectors + evaluators), knowledge readers, and multi-language
      manifest parsers.
    paths:
      - src/lib
    keywords:
      - fs
      - config
      - template
      - scanner
      - merger
      - yaml
      - logger
      - detector
      - module-detector
      - module-map
      - strategy
      - token-accounting
      - drift-checker
      - drift-sources
      - task-markers
      - knowledge-reader
      - feature-map
      - manifest-parsers
      - category
    relationships:
      depends_on:
        - types
      used_by:
        - services
        - cli
        - tests
    aliases:
      - 工具
      - 共用函式
      - utilities
      - helpers
      - 基礎設施
      - infrastructure
      - 量測計算
      - 漂移檢查
      - 知識讀取
    rationale: Foundational infrastructure shared across services, CLI, and benchmark
      scripts

  - name: services
    description: Business logic — one `execute()` service per command — init /
      quickstart / upgrade, knowledge generate + update, change story / plan /
      tasks, archive + spec-sync, agent-sync, measure, drift check, and the
      read-only MCP server.
    paths:
      - src/services
    keywords:
      - init
      - knowledge
      - change
      - archive
      - agent-sync
      - spec-sync
      - product
      - feature-map
      - triggers
      - language
      - measure
      - check
      - mcp
      - serve
    relationships:
      depends_on:
        - types
        - lib
      used_by:
        - cli
        - tests
    aliases:
      - 服務
      - 業務邏輯
      - business logic
      - execute pattern
      - use case
      - 量測報告
      - 漂移檢查
      - 真相層
    rationale: Isolates business logic from I/O layer, enables testability

  - name: cli
    description: Thin CLI entry — Commander commands + formatters that parse → call
      one service → format output. No business logic (delegates everything to
      services).
    paths:
      - src/cli
    keywords:
      - commands
      - formatters
      - commander
      - output
      - preaction
      - measure
      - check
      - strict
      - mcp
      - stdio
    relationships:
      depends_on:
        - types
        - lib
        - services
      used_by:
        - tests
    aliases:
      - 指令
      - 命令列
      - command line
      - 終端
      - entry point
    rationale: "Thin I/O layer: no business logic, delegates to services"

  - name: templates
    description: "Handlebars template library — 17 skills + 5 shared partials, 19
      references, 1 agent-config, 4 change, 15 init/knowledge (62 `.hbs`
      templates). Pure resources consumed by lib/template — the source of every
      generated skill, README, and index."
    paths:
      - src/templates
    keywords:
      - handlebars
      - hbs
      - skills
      - agent-configs
      - recipe-first
      - loading-rules
      - references
      - change
      - stable-prefix
      - entry-gate
      - scale
      - kind
      - ci-workflow
      - flywheel
      - lessons-ledger
      - feature-map
      - category
      - grouping
    relationships:
      depends_on: []
      used_by:
        - lib
        - tests
    aliases:
      - 模板
      - 範本
      - handlebars
      - template engine
      - resources
      - 穩定前綴
      - 知識同步閘門
      - 複雜度適配
      - CI 閘門
    rationale: Pure resources — no logic, consumed by lib/template.ts

  - name: tests
    description: 4-layer test suite — 91 files, 2,129 tests (unit 1392 + contract
      654 + integration 38 + e2e 45) across unit / contract / integration / e2e.
      Validates every module — format contracts, the drift engine, token corpus,
      and the MCP protocol over in-memory transport.
    paths:
      - tests
    keywords:
      - vitest
      - memfs
      - unit
      - integration
      - contract
      - e2e
      - knowledge-format
      - skill-format
      - token-corpus
      - drift
      - lessons-harvest
      - mcp-server
      - in-memory-transport
    relationships:
      depends_on:
        - types
        - lib
        - services
        - cli
        - templates
      used_by: []
    aliases:
      - 測試
      - 單元測試
      - test suite
      - 驗證
      - vitest
    rationale: Quality gate — validates all layers with pyramid coverage
